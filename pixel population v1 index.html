<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Preserve</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── Top stat bar ───────────────────────────────────── -->
  <div id="topbar">
    <div class="stat-block">
      <span class="stat-label">Year</span>
      <span class="stat-value cyan" id="ui-year">0.0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Biomass</span>
      <span class="stat-value yellow" id="ui-biomass">0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Biodiversity</span>
      <span class="stat-value" id="ui-biodiversity">0</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Stability</span>
      <span class="stat-value" id="ui-stability">100%</span>
    </div>
    <div class="stat-block">
      <span class="stat-label">Animals</span>
      <span class="stat-value" id="ui-animals">0</span>
    </div>
    <div id="title-badge">Pixel Preserve v1.0</div>
  </div>

  <!-- ── Main content: canvas + dashboard ──────────────── -->
  <div id="main">

    <!-- Left 70%: habitat canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Right 30%: retro dashboard -->
    <div id="dashboard">

      <!-- Tab buttons -->
      <div id="tab-bar">
        <button class="active" data-tab="map">[ MAP ]</button>
        <button data-tab="skills">[ SKILLS ]</button>
        <button data-tab="log">[ LOG ]</button>
      </div>

      <!-- MAP tab: habitat switcher + live stats -->
      <div id="tab-map" class="tab-content visible">
        <div class="section-header">Select Habitat</div>
        <!-- Habitat buttons injected by game.js -->
        <div id="habitat-list"></div>

        <div class="section-header" style="margin-top:12px;">Live Stats</div>
        <div class="habitat-stats" id="habitat-stats-panel">
          Loading...
        </div>
      </div>

      <!-- SKILLS tab: upgrade cards -->
      <div id="tab-skills" class="tab-content">
        <div class="section-header">Skill Tree</div>
        <!-- Upgrade cards injected by game.js -->
        <div id="skills-list"></div>
      </div>

      <!-- LOG tab: event ticker -->
      <div id="tab-log" class="tab-content">
        <div class="section-header">Event Log</div>
        <div id="log-container"></div>
      </div>

    </div><!-- /dashboard -->
  </div><!-- /main -->
</div><!-- /app -->

<!-- Disaster flash overlay (visual effect only) -->
<div id="disaster-overlay"></div>

<!-- Offline progress modal -->
<div id="offline-modal">
  <div class="modal-box">
    <h2>WELCOME BACK</h2>
    <p id="offline-msg">Your ecosystem kept running while you were away.</p>
    <div class="biomass-gained" id="offline-biomass">+0 Biomass</div>
    <br />
    <button class="modal-btn" id="offline-ok">CONTINUE</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
